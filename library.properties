sentence=Arduino library for driving salvaged TV Receiver / Set-Top Box LED displays driven by FD1642 & CT1642 ICs.
paragraph=Provides a complete C++ driver interface for 4-digit 7-segment LED front panel displays harvested from set-top boxes, TV receivers, and DVD players powered by FD1642, CT1642, SM1642, or ET6227 driver ICs. Supports 4-digit updates, individual digit setters, integer numbers, and HH:MM clock formatting.
